<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 820" role="img" aria-labelledby="title desc">
  <title id="title">Schema der digitalen Haustechnik</title>
  <desc id="desc">Glasfaser und Internet werden über Router und PoE-Switch mit LAN und WLAN, Sicherheit, Energie, Smart Home sowie Garage und Garten verbunden.</desc>
  <defs>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M32 0H0V32" fill="none" stroke="#dce5ec" stroke-width="1"/>
    </pattern>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0l10 5-10 5z" fill="#1f3a93"/>
    </marker>
  </defs>
  <rect width="1200" height="820" rx="32" fill="#f8fafc"/>
  <rect width="1200" height="820" rx="32" fill="url(#grid)" opacity=".72"/>
  <text x="70" y="74" fill="#14233c" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700">Digitale Infrastruktur als gemeinsame Basis</text>
  <text x="70" y="108" fill="#586779" font-family="Arial, Helvetica, sans-serif" font-size="18">Planen - verbinden - prüfen - dokumentieren</text>

  <g font-family="Arial, Helvetica, sans-serif" text-anchor="middle">
    <rect x="410" y="138" width="380" height="78" rx="18" fill="#fff" stroke="#c5d0d9" stroke-width="2"/>
    <circle cx="462" cy="177" r="22" fill="#2d9cdb"/>
    <path d="M450 178c8-10 18-10 26 0m-21 7c5-5 11-5 16 0m-9 7h2" fill="none" stroke="#fff" stroke-width="4" stroke-linecap="round"/>
    <text x="620" y="171" fill="#14233c" font-size="21" font-weight="700">Provider / Glasfaser / Internet</text>
    <text x="620" y="196" fill="#586779" font-size="15">Anschluss bis ins Gebäude</text>

    <path d="M600 216v56" fill="none" stroke="#1f3a93" stroke-width="4" marker-end="url(#arrow)"/>
    <rect x="410" y="286" width="380" height="112" rx="22" fill="#1f3a93"/>
    <text x="600" y="333" fill="#fff" font-size="24" font-weight="700">Router / Gateway / PoE-Switch</text>
    <text x="600" y="364" fill="#dcecff" font-size="16">Netzwerkschrank, Adressen, Stromversorgung, Backup</text>

    <path d="M600 398v56M600 454H130M600 454h470" fill="none" stroke="#1f3a93" stroke-width="4"/>
    <path d="M130 454v48M365 454v48M600 454v48M835 454v48M1070 454v48" fill="none" stroke="#1f3a93" stroke-width="4" marker-end="url(#arrow)"/>

    <g>
      <rect x="30" y="520" width="200" height="150" rx="20" fill="#fff" stroke="#c5d0d9" stroke-width="2"/>
      <circle cx="130" cy="562" r="23" fill="#eaf1fb"/>
      <path d="M113 565c10-13 24-13 34 0m-26 9c5-6 13-6 18 0m-10 9h2" fill="none" stroke="#1f3a93" stroke-width="4" stroke-linecap="round"/>
      <text x="130" y="613" fill="#14233c" font-size="20" font-weight="700">LAN &amp; WLAN</text>
      <text x="130" y="640" fill="#586779" font-size="14">Räume, Homeoffice,</text>
      <text x="130" y="660" fill="#586779" font-size="14">Access Points</text>
    </g>
    <g>
      <rect x="265" y="520" width="200" height="150" rx="20" fill="#fff" stroke="#c5d0d9" stroke-width="2"/>
      <circle cx="365" cy="562" r="23" fill="#eaf1fb"/>
      <path d="M365 545l15 6v12c0 12-7 20-15 25-8-5-15-13-15-25v-12z" fill="none" stroke="#1f3a93" stroke-width="4"/>
      <text x="365" y="613" fill="#14233c" font-size="20" font-weight="700">Sicherheit</text>
      <text x="365" y="640" fill="#586779" font-size="14">Doorbell, Kameras,</text>
      <text x="365" y="660" fill="#586779" font-size="14">lokaler NVR</text>
    </g>
    <g>
      <rect x="500" y="520" width="200" height="150" rx="20" fill="#fff" stroke="#c5d0d9" stroke-width="2"/>
      <circle cx="600" cy="562" r="23" fill="#eaf1fb"/>
      <path d="M592 544h18l-8 15h11l-22 25 7-18h-11z" fill="none" stroke="#1f3a93" stroke-width="4" stroke-linejoin="round"/>
      <text x="600" y="613" fill="#14233c" font-size="20" font-weight="700">Energie</text>
      <text x="600" y="640" fill="#586779" font-size="14">PV, Speicher, Wallbox,</text>
      <text x="600" y="660" fill="#586779" font-size="14">Wärmepumpe</text>
    </g>
    <g>
      <rect x="735" y="520" width="200" height="150" rx="20" fill="#fff" stroke="#c5d0d9" stroke-width="2"/>
      <circle cx="835" cy="562" r="23" fill="#eaf1fb"/>
      <path d="M818 565l17-15 17 15v18h-34zM830 583v-12h10v12" fill="none" stroke="#1f3a93" stroke-width="4" stroke-linejoin="round"/>
      <text x="835" y="613" fill="#14233c" font-size="20" font-weight="700">Smart Home</text>
      <text x="835" y="640" fill="#586779" font-size="14">Plattformen, Gateways,</text>
      <text x="835" y="660" fill="#586779" font-size="14">lokale Funktionen</text>
    </g>
    <g>
      <rect x="970" y="520" width="200" height="150" rx="20" fill="#fff" stroke="#c5d0d9" stroke-width="2"/>
      <circle cx="1070" cy="562" r="23" fill="#eaf1fb"/>
      <path d="M1053 581v-23l17-13 17 13v23m-34-14h34" fill="none" stroke="#1f3a93" stroke-width="4" stroke-linejoin="round"/>
      <text x="1070" y="613" fill="#14233c" font-size="20" font-weight="700">Außenbereiche</text>
      <text x="1070" y="640" fill="#586779" font-size="14">Garage, Garten,</text>
      <text x="1070" y="660" fill="#586779" font-size="14">Nebengebäude</text>
    </g>

    <rect x="120" y="718" width="960" height="62" rx="18" fill="#dff1f0" stroke="#b8d8d6"/>
    <text x="600" y="746" fill="#14233c" font-size="17" font-weight="700">Klare Schnittstellen zu Elektriker, PV-, Heizungs- und Sicherheitspartnern</text>
    <text x="600" y="768" fill="#586779" font-size="14">Elektrische Arbeiten und Montage bleiben beim jeweils berechtigten Fachbetrieb.</text>
  </g>
</svg>
