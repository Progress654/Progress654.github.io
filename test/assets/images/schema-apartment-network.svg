<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">Schema Heimnetz in der Wohnung</title>
  <desc id="desc">Vereinfachtes Wohnungsschema mit Medienverteiler, Router, Switch, LAN-Dosen, Homeoffice, TV und WLAN Access Point.</desc>
  <defs>
